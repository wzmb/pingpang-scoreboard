<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- 记分牌底色 -->
  <rect x="1" y="1" width="30" height="30" rx="4" fill="#112233"/>
  <!-- 分割中线 -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="#fff" stroke-width="1.5"/>
  <!-- 左侧分数 -->
  <text x="8" y="20" font-size="10" fill="#ff4444" font-weight="bold" text-anchor="middle">11</text>
  <!-- 右侧分数 -->
  <text x="24" y="20" font-size="10" fill="#44ddff" font-weight="bold" text-anchor="middle">9</text>
  <!-- 乒乓球小球装饰 -->
  <circle cx="6" cy="6" r="3" fill="#ffffff" stroke="#eee" stroke-width="0.5"/>
  <circle cx="26" cy="6" r="3" fill="#ffffff" stroke="#eee" stroke-width="0.5"/>
</svg>