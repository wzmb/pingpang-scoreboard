<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乒乓球记分板 (Scoreboard)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body tabindex="-1">
    <div class="scoreboard-container">
        <!-- 底部/顶部控制栏 -->
        <div class="top-controls">
            <button class="icon-btn" id="reset-btn" title="重置比赛 (R)">重置比赛 (R)</button>
            <button class="icon-btn" id="fullscreen-btn" title="全屏显示 (F)">全屏显示 (F)</button>
        </div>

        <!-- 左侧队伍 -->
        <div class="team left-team color-red">
            <div class="team-name" id="left-name">主队</div>
            <div class="score" id="left-score">0</div>
            <div class="sets" id="left-sets">0</div>
        </div>

        <!-- 中间信息 -->
        <div class="center-info">
        </div>

        <!-- 右下角二维码及网址 -->
        <div class="qr-panel" id="qr-panel">
            <div class="qr-url-text" id="qr-url-text"></div>
            <div id="qrcode"></div>
        </div>

        <!-- 右侧队伍 -->
        <div class="team right-team color-blue">
            <div class="team-name" id="right-name">客队</div>
            <div class="score" id="right-score">0</div>
            <div class="sets" id="right-sets">0</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
